<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张塬林 - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        .header .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #222;
        }
        .header p {
            color: #666;
            font-size: 1rem;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #00a1d6; /* B站蓝调 */
            border-left: 4px solid #00a1d6;
            padding-left: 10px;
        }
        .card a {
            color: #00a1d6;
            text-decoration: none;
            transition: color 0.2s;
        }
        .card a:hover {
            color: #0086b3;
            text-decoration: underline;
        }
        .card p {
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <!-- 替换为你的图片直链地址 -->
        <img src="https://image2url.com/r2/default/images/1771422311670-5c44b2c9-e293-4b63-b189-bd9fc0e12b53.png" alt="卡通鱼头像" class="avatar">
        <h1>张塬林的个人主页</h1>
        <p>做一点喜欢的事，写一点能用的代码</p>
    </div>

    <div class="card">
        <h2>B站空间</h2>
        <p>大家好，我是张塬林，偶尔会在B站分享一些技术相关的内容，欢迎逛逛～</p>
        <p><a href="https://space.bilibili.com/3546884505340624?spm_id_from=333.788.0.0" target="_blank">https://space.bilibili.com/3546884505340624</a></p>
    </div>

    <div class="card">
        <h2>开发的软件</h2>
        <p>这是我自己折腾的一个引擎相关小项目，目前还在持续完善中</p>
        <p><a href="https://02engine.0pen.top/index.html" target="_blank">https://02engine.0pen.top/index.html</a></p>
    </div>

    <div class="card">
        <h2>GitHub仓库</h2>
        <p>这是我学习3D基础光线追踪时写的代码练习，记录一下自己的学习过程</p>
        <p><a href="https://github.com/Ftesknm/3D-basicrt" target="_blank">https://github.com/Ftesknm/3D-basicrt</a></p>
    </div>

    <div class="footer">
        <p>© 2025 张塬林 | 简单记录，慢慢前行</p>
    </div>
</body>
</html>
